name: Build & Release

# Triggers:
#   1. Push a version tag  →  build both platforms + create GitHub Release
#   2. Manual dispatch      →  same (for testing without tagging)
on:
  push:
    tags:
      - "v*"          # e.g. v1.0.0, v1.2.3-beta
  workflow_dispatch:   # manual trigger from Actions tab

permissions:
  contents: write      # needed to create releases + upload assets

jobs:
  # ─────────────────────────────── Tests ──────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install cryptography>=41.0 pytest
      - run: pip install -e .
      - run: python -m pytest tests/test_wire.py -v

  # ───────────────────────────── macOS build ──────────────────────────────
  build-macos:
    name: macOS (.app → .dmg)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[tray]"
          pip install pyinstaller

      - name: Build Lentel.app
        run: |
          python -m PyInstaller \
            --name Lentel \
            --windowed \
            --noconfirm \
            --clean \
            --hidden-import lentel \
            --hidden-import lentel.app.tray \
            --hidden-import lentel.app.state \
            --hidden-import lentel.app.runner \
            --hidden-import lentel.app.icon \
            --hidden-import lentel.app.dialogs \
            --hidden-import lentel.wire \
            --hidden-import lentel.crypto \
            --hidden-import lentel.chunker \
            --hidden-import lentel.congestion \
            --hidden-import lentel.transport \
            --hidden-import lentel.nat \
            --hidden-import lentel.session \
            --hidden-import lentel.rendezvous \
            --hidden-import lentel.wordlist \
            --hidden-import pystray._darwin \
            --hidden-import PIL._tkinter_finder \
            --collect-submodules lentel \
            --collect-submodules pystray \
            --exclude-module numpy \
            --exclude-module pandas \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module pytest \
            --exclude-module lentel.server \
            --osx-bundle-identifier com.lentel.app \
            lentel/app/__main__.py

      - name: Patch Info.plist (menu-bar only)
        run: |
          PLIST="dist/Lentel.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true"  "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :LSUIElement true"       "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSHighResolutionCapable bool true" "$PLIST" 2>/dev/null || true

      - name: Ad-hoc code-sign the bundle
        run: |
          # Without a paid Apple Developer certificate we can't notarise,
          # but an ad-hoc signature at least satisfies the Apple Silicon
          # runtime loader and gives users a cleaner error message if
          # Gatekeeper intervenes.  Users still need to either right-click →
          # Open on first launch, OR run: xattr -cr /Applications/Lentel.app
          codesign --force --deep --sign - dist/Lentel.app
          codesign --verify --verbose dist/Lentel.app || true

      - name: Create DMG with an unquarantined install helper
        run: |
          rm -rf dmg-staging
          mkdir -p dmg-staging
          cp -R dist/Lentel.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

          # A tiny shell script users can run if Gatekeeper blocks the app
          # with the misleading "is damaged and can't be opened" error.
          # Filename has no special characters — hdiutil dislikes quotes.
          cat > "dmg-staging/Fix damaged app error.command" <<'EOS'
          #!/usr/bin/env bash
          echo "Stripping Gatekeeper quarantine from Lentel.app..."
          for p in /Applications/Lentel.app ~/Applications/Lentel.app \
                   ~/Downloads/Lentel.app "$HOME/Desktop/Lentel.app"; do
            if [ -d "$p" ]; then
              xattr -cr "$p" && echo "  done: $p"
            fi
          done
          echo "You can now double-click Lentel to launch it."
          echo "Press return to close this window."
          read
          EOS
          chmod +x "dmg-staging/Fix damaged app error.command"

          # Let macOS finish flushing codesign writes before hdiutil tries
          # to snapshot the directory — fixes intermittent "Resource busy".
          sync
          sleep 2

          # Retry hdiutil up to 3 times in case the first call races with
          # a lingering file lock (e.g. Spotlight scanning the new binary).
          for attempt in 1 2 3; do
            if hdiutil create -volname "Lentel" \
                -srcfolder dmg-staging \
                -ov -format UDZO \
                -fs HFS+ \
                "Lentel-macOS.dmg"; then
              break
            fi
            echo "hdiutil attempt $attempt failed, retrying..."
            sleep 3
          done
          ls -lh Lentel-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lentel-macOS
          path: Lentel-macOS.dmg

  # ──────────────────────────── Windows build ─────────────────────────────
  build-windows:
    name: Windows (.exe)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[tray]"
          pip install pyinstaller

      - name: Build Lentel.exe
        run: |
          python -m PyInstaller `
            --name Lentel `
            --onefile `
            --noconsole `
            --noconfirm `
            --clean `
            --hidden-import lentel `
            --hidden-import lentel.app.tray `
            --hidden-import lentel.app.state `
            --hidden-import lentel.app.runner `
            --hidden-import lentel.app.icon `
            --hidden-import lentel.app.dialogs `
            --hidden-import lentel.wire `
            --hidden-import lentel.crypto `
            --hidden-import lentel.chunker `
            --hidden-import lentel.congestion `
            --hidden-import lentel.transport `
            --hidden-import lentel.nat `
            --hidden-import lentel.session `
            --hidden-import lentel.rendezvous `
            --hidden-import lentel.wordlist `
            --hidden-import pystray._win32 `
            --hidden-import PIL._tkinter_finder `
            --collect-submodules lentel `
            --collect-submodules pystray `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module matplotlib `
            --exclude-module scipy `
            --exclude-module pytest `
            --exclude-module lentel.server `
            lentel/app/__main__.py

      - name: Verify exe exists
        run: |
          dir dist\Lentel.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lentel-Windows
          path: dist/Lentel.exe

  # ─────────────────────────── GitHub Release ─────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Lentel-macOS
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Lentel-Windows
          path: artifacts/

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lentel ${{ github.ref_name }}"
          body: |
            ## Lentel ${{ github.ref_name }}

            Send any file or folder, any size, to anyone — **no server, no port forwarding**.

            ### Downloads

            | Platform | File | Install |
            |----------|------|---------|
            | **macOS** | `Lentel-macOS.dmg` | Open DMG → drag Lentel to Applications |
            | **Windows** | `Lentel.exe` | Single file — run directly, or add to Startup |

            ### macOS — "Lentel is damaged and can't be opened"

            This is **not** actually a damaged app. Apple's Gatekeeper shows
            this message for any app not signed with a $99/year Apple
            Developer certificate. Two ways to fix it:

            **Option 1 — double-click the included helper** (simplest)
            After opening the DMG, double-click **`Fix 'damaged app' error.command`**.
            It runs a one-line command that strips the quarantine flag.

            **Option 2 — run the command yourself**
            ```bash
            xattr -cr /Applications/Lentel.app
            ```
            Then launch Lentel normally.

            ### How it works

            1. **Sender** clicks "Send a file" (or "Send a folder") → picks it → gets a ticket like `bold-crab-fern-42@203.0.113.5:54321`
            2. **Receiver** clicks "Receive" → pastes the ticket → file/folder transfers directly, peer-to-peer
            3. No server. No account. No port forwarding. The sender's public address is discovered automatically via STUN/UPnP.

            ### What's new

            See [commits since last tag](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/Lentel-macOS.dmg
            artifacts/Lentel.exe
